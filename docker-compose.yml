services:
  cityfit:
    build: .
    container_name: cityfit-ai
    volumes:
      - .:/app
    command: python -m scripts.run_cityfit_ranking

  api:
    build: .
    container_name: cityfit-api
    working_dir: /app
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - PYTHONPATH=/app/src
    command: >
      uvicorn cityfit.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src
      --reload-dir /app/app

  streamlit:
    build: .
    container_name: cityfit-streamlit
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - PYTHONPATH=/app/src
    command: >
      streamlit run app/streamlit_app.py
      --server.address=0.0.0.0
      --server.port=8501
      --server.runOnSave=true
      --server.fileWatcherType=poll

  mlflow:
    build: .
    container_name: cityfit-mlflow
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    command: mlflow ui --host 0.0.0.0 --port 5000

  ollama:
    image: ollama/ollama:latest
    container_name: cityfit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      
volumes:
  hf_cache:
  ollama_data: