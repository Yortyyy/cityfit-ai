services:
  cityfit:
    build: .
    container_name: cityfit-ai
    volumes:
      - .:/app
    command: python -m scripts.run_cityfit_ranking

  api:
    build: .
    container_name: cityfit-api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: uvicorn cityfit.api.main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build: .
    container_name: cityfit-streamlit
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run app/streamlit_app.py --server.address=0.0.0.0 --server.runOnSave=true --server.fileWatcherType=poll

  mlflow:
    build: .
    container_name: cityfit-mlflow
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    command: mlflow ui --host 0.0.0.0 --port 5000